# ✅ VERIFIED WORKING — Enables automerge on Copilot/Dependabot PRs once all
# required status checks pass. Actions pinned to SHA-256 commit hashes.
name: 🔀 Automerge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  pull-requests: write
  contents: write

jobs:
  automerge:
    name: Enable Automerge
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      (
        startsWith(github.head_ref, 'copilot/') ||
        startsWith(github.head_ref, 'dependabot/') ||
        startsWith(github.head_ref, 'renovate/')
      )
    steps:
      - name: Enable automerge
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request in context, skipping.');
              return;
            }
            // Fetch the node ID required for the GraphQL mutation
            const { repository } = await github.graphql(`
              query GetPR($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) { id }
                }
              }
            `, { owner: context.repo.owner, repo: context.repo.repo, number: pr.number });
            await github.graphql(`
              mutation EnableAutoMerge($prId: ID!) {
                enablePullRequestAutoMerge(input: { pullRequestId: $prId, mergeMethod: SQUASH }) {
                  pullRequest { number title }
                }
              }
            `, { prId: repository.pullRequest.id });
            core.info(`✅ Automerge (squash) enabled on PR #${pr.number}: ${pr.title}`);
